name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to build'
        required: false
        default: 'main'
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # macOS (DMG + zip)
  # ────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps
        run: npm ci

      - name: Build & package (DMG + zip)
        working-directory: apps/desktop
        env:
          # Ad-hoc signing — remove these env vars and configure
          # APPLE_ID / APPLE_TEAM_ID secrets for notarized builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-macOS-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.dmg
          retention-days: 30

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-macOS-zip-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.zip
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # Windows (NSIS installer + MSI)
  # ────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps
        run: npm ci

      - name: Build & package (NSIS + MSI)
        working-directory: apps/desktop
        run: npm run dist:win

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.exe
          retention-days: 30

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Windows-MSI-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.msi
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # Linux (AppImage + deb + rpm)
  # ────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system deps (for AppImage/deb/rpm)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools rpm fakeroot dpkg

      - name: Install workspace deps
        run: npm ci

      - name: Build & package (AppImage + deb + rpm)
        working-directory: apps/desktop
        run: npm run dist:linux

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Linux-AppImage-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.AppImage
          retention-days: 30

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Linux-deb-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.deb
          retention-days: 30

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Linux-rpm-${{ github.sha }}
          path: apps/desktop/release/Hermes-*.rpm
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # 打 tag 时自动创建 GitHub Release（draft）
  # ────────────────────────────────────────────────────────
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create/update GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
